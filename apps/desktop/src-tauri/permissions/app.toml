[[permission]]
identifier = "app-commands"
description = "Allow Minisatoshi desktop IPC commands"
commands.allow = [
  "compile_vault_descriptor",
  "create_wallet",
  "list_wallets",
  "create_vault",
  "list_vaults",
  "get_vault",
  "new_receive_address",
  "get_balance",
  "sync_vault",
  "create_psbt",
  "sign_psbt_software",
  "combine_psbts",
  "finalize_psbt_cmd",
  "broadcast_psbt_cmd",
  "export_sparrow_wallet",
  "list_server_presets",
  "app_version",
  "save_text_file"
]
