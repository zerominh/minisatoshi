  "sign_psbt_software",
  "sign_psbt_hot",
  "create_hot_keystore",
  "unlock_hot_keystore",
  "lock_hot_keystore",
  "hot_keystore_status",
  "list_hot_wallets",
  "import_hot_wallet",
  "delete_hot_wallet",
  "list_spending_paths",
  "analyze_psbt_status",
  "list_hw_devices",
  "hw_get_xpub",
  "hw_sign_psbt",
